services:
  restate:
    image: docker.io/restatedev/restate:latest
    ports:
      - "8080:8080"
      - "9070:9070"
    environment:
      - RESTATE_NODE_NAME=811416e0bff6
      - RESTATE_OBSERVABILITY__JAEGER__ENDPOINT=http://host.docker.internal:4317
    volumes:
      - restate-data:/restate-data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/9070'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  surrealdb:
    image: surrealdb/surrealdb:latest
    user: root
    ports:
      - "8000:8000"
    command: start --user root --pass root rocksdb:///data/surreal.db
    volumes:
      - surreal-data:/data
    restart: unless-stopped

  surrealdb-test:
    image: surrealdb/surrealdb:latest
    user: root
    ports:
      - "8001:8000"
    command: start --user root --pass root rocksdb:///data-test/surreal.db
    volumes:
      - surreal-test-data:/data
    restart: unless-stopped

  workflow-runtime:
    build:
      context: .
      dockerfile: apps/workflow-runtime/Dockerfile
    env_file: .env
    environment:
      - NITRO_API_URL=http://host.docker.internal:3002
      - WORKFLOW_HEALTH_PORT=8091
    ports:
      - "9080:9080"
      - "9081:8091"
    depends_on:
      - restate
      - surrealdb
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${WORKFLOW_HEALTH_PORT}/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  restate-register:
    image: docker.io/restatedev/restate:latest
    depends_on:
      workflow-runtime:
        condition: service_healthy
    environment:
      - RESTATE_ADMIN_URL=http://restate:9070
    entrypoint: ["/bin/sh", "-c"]
    command: ["restate dp add http://workflow-runtime:9080 --yes"]
    restart: "no"

  health-monitor:
    build:
      context: ./apps/health-monitor
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - RESTATE_META_URL=http://restate:9070
      - WORKFLOW_HEALTH_URL=http://workflow-runtime:8091
      - API_URL=http://host.docker.internal:3002
      - HEALTH_CHECK_INTERVAL_MS=60000
      - HEALTH_CHECK_RETENTION_DAYS=365
      - HEALTH_MONITOR_PORT=3010
      - HEALTH_MONITOR_DB_PATH=/data/health-monitor.db
    ports:
      - "127.0.0.1:3010:3010"
    volumes:
      - health-monitor-data:/data
    depends_on:
      - surrealdb
      - restate
      - workflow-runtime
    healthcheck:
      test: ["CMD-SHELL", "bun -e 'fetch(\"http://localhost:3010/health\").then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped


volumes:
  surreal-data:
  surreal-test-data:
  restate-data:
  health-monitor-data:
