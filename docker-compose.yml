services:
  restate:
    image: docker.io/restatedev/restate:latest
    ports:
      - "8080:8080"
      - "9070:9070"
    environment:
      - RESTATE_NODE_NAME=811416e0bff6
      - RESTATE_OBSERVABILITY__JAEGER__ENDPOINT=http://host.docker.internal:4317
    volumes:
      - restate-data:/restate-data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/9070'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  surrealdb:
    image: surrealdb/surrealdb:latest
    user: root
    ports:
      - "8000:8000"
    command: start --user root --pass root rocksdb:///data/surreal.db
    volumes:
      - surreal-data:/data
    restart: unless-stopped

  surrealdb-test:
    image: surrealdb/surrealdb:latest
    user: root
    ports:
      - "8001:8000"
    command: start --user root --pass root rocksdb:///data-test/surreal.db
    volumes:
      - surreal-test-data:/data
    restart: unless-stopped

  workflow-runtime:
    build:
      context: .
      dockerfile: apps/workflow-runtime/Dockerfile
    env_file: .env
    environment:
      - NITRO_API_URL=http://host.docker.internal:3002
    ports:
      - "9080:9080"
    depends_on:
      - restate
      - surrealdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  restate-register:
    image: docker.io/restatedev/restate:latest
    depends_on:
      workflow-runtime:
        condition: service_healthy
    environment:
      - RESTATE_ADMIN_URL=http://restate:9070
    entrypoint: ["/bin/sh", "-c"]
    command: ["restate dp add http://workflow-runtime:9080 --yes"]
    restart: "no"

  health-monitor:
    build:
      context: .
      dockerfile: apps/health-monitor/Dockerfile
    env_file: .env
    environment:
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - RESTATE_META_URL=http://restate:9070
      - WORKFLOW_RUNTIME_URL=http://workflow-runtime:9080
      - API_URL=http://host.docker.internal:3002
      - HEALTH_CHECK_INTERVAL_MS=1800000
      - HEALTH_CHECK_RETENTION_DAYS=365
      - HEALTH_MONITOR_PORT=3010
      - HEALTH_MONITOR_DB_PATH=/data/health-monitor.db
    ports:
      - "127.0.0.1:3010:3010"
    volumes:
      - health-monitor-data:/data
    depends_on:
      - surrealdb
      - restate
      - workflow-runtime
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASS=root
      - WEB_URL=http://host.docker.internal:3000
      - ADMIN_URL=http://host.docker.internal:3001
      - HEALTH_MONITOR_URL=http://health-monitor:3010
    ports:
      - "3002:3002"
    depends_on:
      surrealdb:
        condition: service_started
      health-monitor:
        condition: service_healthy
    restart: unless-stopped

volumes:
  surreal-data:
  surreal-test-data:
  restate-data:
  health-monitor-data:
