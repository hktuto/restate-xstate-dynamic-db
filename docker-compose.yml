services:
  restate:
    image: docker.io/restatedev/restate:latest
    ports:
      - "8080:8080"
      - "9070:9070"
    environment:
      - RESTATE_OBSERVABILITY__JAEGER__ENDPOINT=http://host.docker.internal:4317
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/9070'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  surrealdb:
    image: surrealdb/surrealdb:latest
    user: root
    ports:
      - "8000:8000"
    command: start --user root --pass root surrealkv:///data/surreal.db
    volumes:
      - surreal-data:/data
    restart: unless-stopped

  workflow-runtime:
    build:
      context: .
      dockerfile: apps/workflow-runtime/Dockerfile
    env_file: .env
    environment:
      - NITRO_API_URL=http://host.docker.internal:3000
    ports:
      - "9080:9080"
    depends_on:
      - restate
      - surrealdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  restate-register:
    image: docker.io/restatedev/restate:latest
    depends_on:
      workflow-runtime:
        condition: service_healthy
    environment:
      - RESTATE_ADMIN_URL=http://restate:9070
    entrypoint: ["/bin/sh", "-c"]
    command: ["restate dp add http://workflow-runtime:9080 --yes --use-http1.1"]
    restart: "no"

  health-monitor:
    build:
      context: .
      dockerfile: apps/health-monitor/Dockerfile
    env_file: .env
    environment:
      - SURREAL_URL=http://surrealdb:8000/rpc
      - RESTATE_META_URL=http://restate:9070
      - WORKFLOW_RUNTIME_URL=http://workflow-runtime:9080
      - WEB_API_URL=http://host.docker.internal:3000
      - HEALTH_CHECK_INTERVAL_MS=1800000
      - HEALTH_CHECK_RETENTION_DAYS=365
    depends_on:
      - surrealdb
      - restate
      - workflow-runtime
    restart: unless-stopped

volumes:
  surreal-data:
